[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/firestore.rules"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/firebase.json"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/FIREBASE_SETUP_HE.md"
  to = "/index.html"
  status = 404
